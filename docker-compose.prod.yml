# Docker Compose — Production
services:
    traefik:
        image: traefik:v2.11
        restart: unless-stopped
        command:
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entrypoints.web.http.redirections.entryPoint.to=websecure
            - --entrypoints.web.http.redirections.entryPoint.scheme=https
            - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
            - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
            - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
            - --log.level=INFO
            - --api.dashboard=true
            - --api.insecure=false
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - traefik-letsencrypt:/letsencrypt
        networks:
            - prod-network
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
            - "traefik.http.routers.traefik.entrypoints=websecure"
            - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
            - "traefik.http.routers.traefik.service=api@internal"
            - "traefik.http.routers.traefik.middlewares=auth"
            - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_ADMIN_USER}:${TRAEFIK_ADMIN_PASSWORD_HASH}"

    database:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DATABASE_NAME}
            MYSQL_USER: ${DATABASE_USER}
            MYSQL_PASSWORD: ${DATABASE_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
        volumes:
            - db-data:/var/lib/mysql
        networks:
            - prod-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 20s
            retries: 10
        # Нет открытых портов — доступ только через внутреннюю сеть

    wordpress:
        depends_on:
            database:
                condition: service_healthy
        restart: unless-stopped
        image: wordpress:6.9.4-php8.2-apache
        environment:
            WORDPRESS_DB_HOST: database:3306
            WORDPRESS_DB_USER: "${DATABASE_USER}"
            WORDPRESS_DB_NAME: "${DATABASE_NAME}"
            WORDPRESS_DB_PASSWORD: "${DATABASE_PASSWORD}"
        networks:
            - prod-network
        volumes:
            - wp-data:/var/www/html
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.wordpress.rule=Host(`wp.${DOMAIN}`)"
            - "traefik.http.routers.wordpress.entrypoints=websecure"
            - "traefik.http.routers.wordpress.tls.certresolver=letsencrypt"
            - "traefik.http.services.wordpress.loadbalancer.server.port=80"
        # Нет открытых портов — доступ только через Traefik
        # Нет volumes с docker.sock — изолирован

    frontend:
        image: ghcr.io/ragurestaurant/ragu:main
        depends_on:
            wordpress:
                condition: service_started
        environment:
            NEXT_PUBLIC_BASE_URL: https://${DOMAIN}
            NEXT_PUBLIC_WORDPRESS_API_URL: http://wordpress
            NEXT_PUBLIC_WORDPRESS_API_HOSTNAME: wordpress
            SCHEMA_URL: http://wordpress/graphql
        networks:
            - prod-network
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
            - "traefik.http.routers.frontend.entrypoints=websecure"
            - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
            - "traefik.http.services.frontend.loadbalancer.server.port=3000"
        # В production Next.js запускается автоматически
        # (в prod не нужен ручной контроль)

    wpcli:
        build:
            dockerfile: Dockerfile.wpcli
        user: root
        depends_on:
            database:
                condition: service_healthy
            wordpress:
                condition: service_started
        environment:
            WORDPRESS_DB_HOST: database
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
            WORDPRESS_URL: https://${DOMAIN}
            WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
        volumes:
            - wp-data:/var/www/html
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        networks:
            - prod-network

volumes:
    db-data:
        name: ragu-prod-db-data
    wp-data:
        name: ragu-prod-wp-data
    traefik-letsencrypt:
        name: ragu-prod-traefik-letsencrypt

networks:
    prod-network:
        driver: bridge
