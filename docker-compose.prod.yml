version: "3.9"

services:
    traefik:
        image: traefik:v2.11
        restart: unless-stopped
        command:
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --certificatesresolvers.dev.acme.tlschallenge=true
            - --certificatesresolvers.dev.acme.email=your@email.com
            - --certificatesresolvers.dev.acme.storage=/letsencrypt/acme.json
            - --log.level=INFO
            - --api.dashboard=true
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - letsencrypt:/letsencrypt
        networks:
            - ragu-network

    database:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DATABASE_NAME}
            MYSQL_USER: ${DATABASE_USER}
            MYSQL_PASSWORD: ${DATABASE_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
        volumes:
            - db-data:/var/lib/mysql
        networks:
            - ragu-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 20s
            retries: 10

    wordpress:
        image: wordpress:6.8.2-php8.1-apache
        restart: unless-stopped
        depends_on:
            database:
                condition: service_healthy
        environment:
            WORDPRESS_DB_HOST: database:3306
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
            PHP_UPLOAD_MAX_FILESIZE: 128M
            PHP_POST_MAX_SIZE: 128M
        volumes:
            - wp-data:/var/www/html
        command: >
            sh -c "
              apt-get update && apt-get install -y curl &&
              echo 'upload_max_filesize = 10M' >> /usr/local/etc/php/conf.d/uploads.ini
            "
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.wordpress.rule=Host(`wordpress.restoranragu.ru`)"
            - "traefik.http.routers.wordpress.entrypoints=websecure"
            - "traefik.http.routers.wordpress.tls.certresolver=dev"
        networks:
            - ragu-network

    phpmyadmin:
        image: phpmyadmin/phpmyadmin:latest
        restart: unless-stopped
        depends_on:
            database:
                condition: service_healthy
        environment:
            PMA_HOST: database
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.pma.rule=Host(`pma.restoranragu.ru`)"
            - "traefik.http.routers.pma.entrypoints=websecure"
            - "traefik.http.routers.pma.tls.certresolver=dev"
            - "traefik.http.middlewares.pma-auth.basicauth.users=admin:$$apr1$$xyz$$hashedpassword"
            - "traefik.http.routers.pma.middlewares=pma-auth"
        networks:
            - ragu-network

    frontend:
        image: ghcr.io/ragurestaurant/ragu:main
        restart: unless-stopped
        depends_on:
            wordpress:
                condition: service_started
        environment:
            WORDPRESS_URL: http://wordpress:80
            SCHEMA_URL: http://wordpress:80/graphql
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.frontend.rule=Host(`next.restoranragu.ru`)"
            - "traefik.http.routers.frontend.entrypoints=websecure"
            - "traefik.http.routers.frontend.tls.certresolver=dev"
            - "traefik.http.services.frontend.loadbalancer.server.port=3000"
        networks:
            - ragu-network

volumes:
    db-data:
    wp-data:
    letsencrypt:

networks:
    ragu-network:
        driver: bridge
