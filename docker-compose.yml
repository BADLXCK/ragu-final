# Docker Compose — Development
services:
    db:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DATABASE_NAME}
            MYSQL_USER: ${DATABASE_USER}
            MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
            MYSQL_PASSWORD: ${DATABASE_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - dev-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 3s
            retries: 20
            start_period: 10s

    wordpress:
        depends_on:
            db:
                condition: service_healthy
        image: wordpress:6.9.4-php8.2-apache
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
        volumes:
            - wp_data:/var/www/html
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        networks:
            - dev-network
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80"] # Check if the server returns 200 OK
            interval: 10s
            timeout: 15s
            retries: 20
            start_period: 60s

    frontend:
        build:
            context: .
            dockerfile: Dockerfile.frontend
        depends_on:
            wordpress:
                condition: service_healthy
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            NEXT_PUBLIC_BASE_URL: http://localhost:3000
            NEXT_PUBLIC_WORDPRESS_API_URL: http://wordpress:80
            NEXT_PUBLIC_WORDPRESS_API_HOSTNAME: wordpress
            SCHEMA_URL: http://wordpress:80/graphql
        volumes:
            - .:/usr/app
            - frontend-node_modules:/usr/app/node_modules
            - frontend-next:/usr/app/.next
        networks:
            - dev-network

    wpcli:
        build:
            context: .
            dockerfile: Dockerfile.wpcli
        user: root
        restart: "no"
        depends_on:
            wordpress:
                condition: service_healthy
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
            WORDPRESS_URL: ${WORDPRESS_URL}
            WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
        volumes:
            - wp_data:/var/www/html
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        networks:
            - dev-network

volumes:
    db_data:
        name: ragu-db-data
    wp_data:
        name: ragu-wp-data
    frontend-node_modules:
        name: ragu-frontend-node-modules
    frontend-next:
        name: ragu-frontend-next

networks:
    dev-network:
        driver: bridge
