services:
    db:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DATABASE_NAME}
            MYSQL_USER: ${DATABASE_USER}
            MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
            MYSQL_PASSWORD: ${DATABASE_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - wp-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "mysql -uroot -p${DATABASE_ROOT_PASSWORD} -e 'SELECT 1;' >/dev/null 2>&1",
                ]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 10s
        profiles:
            - core
            - setup

    wordpress:
        depends_on:
            db:
                condition: service_healthy
        image: wordpress:6.9.4-php8.2-apache
        restart: unless-stopped
        ports:
            - 8080:80
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
        volumes:
            - wp_data:/var/www/html
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        networks:
            - wp-network
        profiles:
            - core
            - setup

    wpcli:
        image: wordpress:cli
        user: root
        command: ["bash", "/usr/local/bin/wp-init.sh"]
        depends_on:
            db:
                condition: service_healthy
            wordpress:
                condition: service_started
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
            WP_USER: ${DATABASE_USER}
            WP_PASSWORD: ${DATABASE_PASSWORD}
            WP_URL: ${WP_URL}
            WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
        volumes:
            - wp_data:/var/www/html
            - ./wp-init.sh:/usr/local/bin/wp-init.sh # монтируем скрипт
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        networks:
            - wp-network
        profiles:
            - setup

volumes:
    db_data:
    wp_data:

networks:
    wp-network:
