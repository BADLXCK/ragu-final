# Docker Compose — Development
services:
    db:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DATABASE_NAME}
            MYSQL_USER: ${DATABASE_USER}
            MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
            MYSQL_PASSWORD: ${DATABASE_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - dev-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "mysql -uroot -p${DATABASE_ROOT_PASSWORD} -e 'SELECT 1;' >/dev/null 2>&1",
                ]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 10s

    wordpress:
        depends_on:
            db:
                condition: service_healthy
        build:
            context: .
            dockerfile: Dockerfile.wordpress
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
        volumes:
            - wp_data:/var/www/html
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        networks:
            - dev-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'php -r "require ''/var/www/html/wp-load.php''; echo ''OK'';" >/dev/null 2>&1',
                ]
            interval: 5s
            timeout: 3s
            retries: 20
            start_period: 20s

    frontend:
        build:
            context: .
            dockerfile: Dockerfile.frontend
        depends_on:
            wordpress:
                condition: service_started
        ports:
            - "3000:3000"
        environment:
            NEXT_PUBLIC_BASE_URL: http://localhost:3000
            NEXT_PUBLIC_WORDPRESS_API_URL: http://wordpress:80
            NEXT_PUBLIC_WORDPRESS_API_HOSTNAME: wordpress
            SCHEMA_URL: http://wordpress:80/graphql
        volumes:
            - .:/usr/app
            - /usr/app/node_modules
            - /usr/app/.next
        networks:
            - dev-network
        # "Спящий" режим — ждёт команды запуска
        command: ["tail", "-f", "/dev/null"]
        profiles:
            - frontend

    wpcli:
        build:
            dockerfile: Dockerfile.wpcli
        user: root
        depends_on:
            db:
                condition: service_healthy
            wordpress:
                condition: service_healthy
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
            WORDPRESS_URL: ${WORDPRESS_URL}
            WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
        volumes:
            - wp_data:/var/www/html
            - ./wp-init.sh:/usr/local/bin/wp-init.sh
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        networks:
            - dev-network
        command: ["bash", "/usr/local/bin/wp-init.sh"]

volumes:
    db_data:
    wp_data:

networks:
    dev-network:
        driver: bridge
