version: "3.9"

services:
    database:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DATABASE_NAME}
            MYSQL_USER: ${DATABASE_USER}
            MYSQL_PASSWORD: ${DATABASE_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
        volumes:
            - db:/var/lib/mysql
        networks:
            - ragu-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD --silent",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 40s

    wordpress:
        image: wordpress:6.9.4-php8.2-apache
        restart: unless-stopped
        ports:
            - 8080:80
        environment:
            WORDPRESS_DB_HOST: database:3306
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
        volumes:
            - wordpress:/var/www/html
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        networks:
            - ragu-network
        user: "33:33"

    wp-init:
        build:
            context: .
            dockerfile: Dockerfile.wp-init
        networks:
            - ragu-network
        volumes:
            - wordpress:/var/www/html
            - ./wp-content/themes/ragu:/var/www/html/wp-content/themes/ragu
        depends_on:
            - wordpress
        environment:
            WORDPRESS_DB_HOST: database:3306
            WORDPRESS_DB_USER: ${DATABASE_USER}
            WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
            WORDPRESS_DB_NAME: ${DATABASE_NAME}
            WP_PATH: /var/www/html
            UPDRAFT_GOOGLE_CLIENT_ID: "${UPDRAFT_GOOGLE_CLIENT_ID}"
            UPDRAFT_GOOGLE_CLIENT_SECRET: "${UPDRAFT_GOOGLE_CLIENT_SECRET}"
            UPDRAFT_GOOGLE_REFRESH_TOKEN: "${UPDRAFT_GOOGLE_REFRESH_TOKEN}"
            UPDRAFT_GOOGLE_FOLDER: "${UPDRAFT_GOOGLE_FOLDER}"
        user: "33:33"

volumes:
    wordpress:
    db:

networks:
    ragu-network:
